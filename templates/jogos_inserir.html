{% extends "_base.html" %}

{% block conteudo %}
<h3>Inserir jogo</h3>

{% if erro %}
<p style="color: red">{{ erro }}</p>
{% endif %}

<form action="jogos_inserir.php" method="post">
    <input type="text" name="nome" placeholder="Nome">
    <br>
    <select name="estilo">
        <option value="acao">Ação</option>
        <option value="acao">Tiro</option>
        <option value="acao">RPG</option>
    </select>
    <br>
    Capa: <input type="file" name="capa">
    <br>
    <input type="submit" value="Gravar">
</form>
{% endblock %}
